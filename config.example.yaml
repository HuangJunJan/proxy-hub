# proxy-hub 配置示例
#
# 优先级（后者覆盖前者）：内置默认值 → 本文件 → 环境变量（前缀 PROXY_HUB_）。
# 嵌套键的环境变量以下划线连接，例如 server.addr 对应 PROXY_HUB_SERVER_ADDR。
#
# 非密钥键（server 超时、log.level、retention_days 等）支持 fsnotify 热重载；
# 密钥类（admin_key）不热重载，变更需重启。

server:
  # 监听地址。默认 ":7777"。
  addr: ":7777"
  # 读超时。Go duration 格式，例如 30s、1m。
  read_timeout: 30s
  # 写超时。
  write_timeout: 60s
  # 请求体大小上限（字节）。默认 33554432（32MB）。
  body_limit: 33554432

# 数据目录。派生：数据库 = data_dir/proxy-hub.db，凭证目录 = data_dir/auths。
data_dir: "./data"

# 管理端鉴权密钥。留空则首次运行自动生成 32 字节随机值并打印一次（请妥善保存）。
# 也可用环境变量 PROXY_HUB_ADMIN_KEY 注入。守护 /admin/*；中转端点 /v1/* 走入站 key。
admin_key: ""

log:
  # 日志级别：debug | info | warn | error。
  level: "info"
  # 日志格式：text | json。
  format: "text"

# 中转相关配置。
relay:
  # 单次请求跨渠道重试的最大次数。默认 2。
  max_retries: 2
  # 是否启用跨方言转换（OpenAI ⇄ Claude）。默认 false；一致性套件验证绿后再开。
  enable_cross_dialect: false
  # 用量事件通道容量。默认 16384；满时丢弃并计数（经仪表盘暴露，非静默）。
  usage_buffer: 16384

# 统计采集相关配置。
stats:
  # 事实行批量插入阈值。默认 100。
  batch_size: 100
  # 批量插入的最大等待毫秒。默认 200。
  batch_interval_ms: 200
  # 滚动汇总 UPSERT flush 周期（秒）。默认 60。
  flush_interval_s: 60
  # 用量通道满时是否改同步插入兜底（true=绝不丢计费但热路径偶发阻塞；false=计数丢弃）。默认 false。
  sync_fallback_on_full: false

# 原始请求日志保留天数（汇总数据不受影响）。默认 30。
retention_days: 30
